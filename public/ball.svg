<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="bc">
      <circle cx="50" cy="50" r="44"/>
    </clipPath>
    <radialGradient id="bg" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#e4e4e4"/>
      <stop offset="100%" stop-color="#b8b8b8"/>
    </radialGradient>
  </defs>
  <!-- Dark circular background -->
  <circle cx="50" cy="50" r="50" fill="#091a0f"/>
  <!-- Ball base -->
  <circle cx="50" cy="50" r="45" fill="url(#bg)"/>
  <!-- Black patches -->
  <g clip-path="url(#bc)">
    <!-- Centre pentagon -->
    <polygon points="50,28 69,42 62,64 38,64 31,42" fill="#111"/>
    <!-- 5 edge ellipses at r=34, angles 36°,108°,180°,252°,324° from top -->
    <g transform="translate(50,50)">
      <ellipse cx="0" cy="-34" rx="10.5" ry="6.5" transform="rotate(36)"  fill="#111"/>
      <ellipse cx="0" cy="-34" rx="10.5" ry="6.5" transform="rotate(108)" fill="#111"/>
      <ellipse cx="0" cy="-34" rx="10.5" ry="6.5" transform="rotate(180)" fill="#111"/>
      <ellipse cx="0" cy="-34" rx="10.5" ry="6.5" transform="rotate(252)" fill="#111"/>
      <ellipse cx="0" cy="-34" rx="10.5" ry="6.5" transform="rotate(324)" fill="#111"/>
    </g>
  </g>
  <!-- Outline -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#aaa" stroke-width="1"/>
  <!-- Shine -->
  <ellipse cx="36" cy="28" rx="7" ry="5" fill="white" fill-opacity="0.4" transform="rotate(-30,36,28)"/>
</svg>

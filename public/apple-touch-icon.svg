<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <clipPath id="bc">
      <circle cx="90" cy="90" r="79"/>
    </clipPath>
    <radialGradient id="bg" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#e4e4e4"/>
      <stop offset="100%" stop-color="#b8b8b8"/>
    </radialGradient>
  </defs>
  <!-- Dark background -->
  <rect width="180" height="180" fill="#091a0f"/>
  <!-- Subtle glow -->
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#22c55e" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
  </radialGradient>
  <rect width="180" height="180" fill="url(#glow)"/>
  <!-- Ball base -->
  <circle cx="90" cy="90" r="80" fill="url(#bg)"/>
  <!-- Black patches -->
  <g clip-path="url(#bc)">
    <!-- Centre pentagon (r=40 from centre, vertex up) -->
    <polygon points="90,50 128,76 114,119 66,119 52,76" fill="#111"/>
    <!-- 5 edge ellipses at r=61, angles 36°,108°,180°,252°,324° -->
    <g transform="translate(90,90)">
      <ellipse cx="0" cy="-61" rx="18.5" ry="12" transform="rotate(36)"  fill="#111"/>
      <ellipse cx="0" cy="-61" rx="18.5" ry="12" transform="rotate(108)" fill="#111"/>
      <ellipse cx="0" cy="-61" rx="18.5" ry="12" transform="rotate(180)" fill="#111"/>
      <ellipse cx="0" cy="-61" rx="18.5" ry="12" transform="rotate(252)" fill="#111"/>
      <ellipse cx="0" cy="-61" rx="18.5" ry="12" transform="rotate(324)" fill="#111"/>
    </g>
  </g>
  <!-- Outline -->
  <circle cx="90" cy="90" r="80" fill="none" stroke="#bbb" stroke-width="2"/>
  <!-- Shine -->
  <ellipse cx="65" cy="52" rx="14" ry="9" fill="white" fill-opacity="0.4" transform="rotate(-30,65,52)"/>
</svg>

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/save-bracket"
  to = "/.netlify/functions/save-bracket"
  status = 200

[[redirects]]
  from = "/api/get-bracket"
  to = "/.netlify/functions/get-bracket"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"

[dev]
  command = "npm run dev"
  targetPort = 5173
